## IDF Component Manager manifest — Phase 14a.
## arduino-esp32 3.2.x is the last tag that targets IDF v5.4.x (3.3.x bumps to v5.5). The
## Arduino runtime is used directly (no setup()/loop()); we drive Arduino via initArduino()
## from app_main. SimpleFOC v2.4.0 is vendored in ../components/SimpleFOC/ (not in the
## component registry), so it does not appear here.
dependencies:
  idf:
    version: ">=5.4.0"
  espressif/arduino-esp32:
    version: "^3.2.0"
